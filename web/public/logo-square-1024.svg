<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="LitPump">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101410"/>
      <stop offset="1" stop-color="#040603"/>
    </linearGradient>
    <linearGradient id="candle" x1="512" y1="224" x2="512" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6ff5a"/>
      <stop offset="1" stop-color="#7fcc06"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="12" y="12" width="1000" height="1000" rx="212"
        fill="none" stroke="#a3ff12" stroke-width="24" stroke-opacity="0.85"/>

  <!-- Litecoin "Ł" stem + base -->
  <g stroke="#f4f4f4" stroke-width="96" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M384 224 L384 800 L736 800"/>
  </g>

  <!-- Candlestick body + wicks -->
  <rect x="480" y="352" width="160" height="320" rx="32"
        fill="url(#candle)" stroke="#0a0d05" stroke-width="24"/>
  <line x1="560" y1="352" x2="560" y2="224"
        stroke="#f4f4f4" stroke-width="32" stroke-linecap="round"/>
  <line x1="560" y1="672" x2="560" y2="736"
        stroke="#f4f4f4" stroke-width="32" stroke-linecap="round" opacity="0.6"/>
</svg>
