name: contracts

on:
  push:
    branches: [main]
    paths: ["contracts/**", ".github/workflows/contracts.yml"]
  pull_request:
    paths: ["contracts/**", ".github/workflows/contracts.yml"]

jobs:
  test:
    name: Foundry build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      - name: Install deps (idempotent)
        run: |
          forge install foundry-rs/forge-std --no-commit || true
          forge install OpenZeppelin/openzeppelin-contracts --no-commit || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv

      - name: Coverage report (summary)
        run: forge coverage --report summary
        continue-on-error: true
