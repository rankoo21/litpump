name: web

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web.yml"]

jobs:
  build:
    name: Next.js typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - name: Build (uses placeholder env)
        env:
          NEXT_PUBLIC_FACTORY_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_COMMENTS_ADDRESS: "0x0000000000000000000000000000000000000000"
        run: npm run build
